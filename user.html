<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Center - A Steward</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
        input, select {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
        }
        input::placeholder, select {
            color: rgba(255, 255, 255, 0.7);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 1rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
        }
        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>👤 My Center</h1>
        <form id="user-form">
            <div class="form-group">
                <label for="career">职业 / 事业方向</label>
                <input type="text" id="career" placeholder="如：产品经理、设计师、程序员">
            </div>
            <div class="form-group">
                <label for="emotion">情感状态</label>
                <select id="emotion">
                    <option value="single">单身</option>
                    <option value="relationship">恋爱中</option>
                    <option value="married">已婚</option>
                    <option value="complicated">复杂关系</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mood">当前心情</label>
                <input type="text" id="mood" placeholder="如：平静、焦虑、充满动力">
            </div>
            <button type="submit" class="btn">保存设置</button>
        </form>
    </div>

    <script>
        document.getElementById('user-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('个人信息已保存！AI 会根据你的信息生成更精准的任务。');
        });
    </script>
</body>
</html>

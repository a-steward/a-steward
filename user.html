<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen" 
onload="initDarkMode();checkLogin();loadUser();renderRealNameSimple();renderAIMemorySimple();renderTasks();checkAutoBirthdayWish()">

<div class="max-w-md mx-auto px-4 py-3">
  <a href="index.html" class="inline-block px-3 py-1 bg-blue-500 text-white rounded-lg text-xs">← 返回主页</a>
</div>

<div class="max-w-md mx-auto p-5 space-y-4 pb-20">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5 text-center">
    <label class="relative cursor-pointer block w-20 h-20 mx-auto">
      <img id="avatar" class="w-20 h-20 rounded-full object-cover border-2 border-white dark:border-gray-700">
      <input type="file" accept="image/*" onchange="uploadAvatar(event)" class="hidden">
      <div class="absolute bottom-0 right-0 bg-blue-500 text-white text-xs px-1 py-0.5 rounded-full">换图</div>
    </label>
    <div class="mt-2">
      <h3 id="name" class="text-lg font-bold dark:text-white"></h3>
      <p id="account" class="text-xs text-gray-500 dark:text-gray-400"></p>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="text-sm font-semibold dark:text-white mb-2">昵称设置</div>
    <div class="flex justify-between items-center">
      <span class="text-xs dark:text-white">修改昵称</span>
      <button onclick="editNickname()" class="text-xs text-blue-500">修改</button>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="text-sm font-semibold dark:text-white mb-2">实名认证</div>
    <div class="flex justify-between items-center">
      <span id="real-status" class="text-xs dark:text-white"></span>
      <button id="real-btn" onclick="submitRealNameSimple()" class="text-xs px-2 py-1 bg-blue-500 text-white rounded"></button>
    </div>
    <p class="text-[10px] text-gray-400 mt-1">自动识别生日，当天隐藏祝福</p>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="text-sm font-semibold dark:text-white mb-2">AI 记忆</div>
    <div class="space-y-2">
      <div class="flex justify-between items-center">
        <span class="text-xs dark:text-white">习惯</span>
        <span id="show-habit" class="text-xs text-gray-500"></span>
        <button onclick="setHabitPrompt()" class="text-xs text-blue-500">改</button>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-xs dark:text-white">喜好</span>
        <span id="show-favor" class="text-xs text-gray-500"></span>
        <button onclick="setFavorPrompt()" class="text-xs text-blue-500">改</button>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="flex justify-between items-center mb-2">
      <p class="text-sm font-semibold dark:text-white">今日任务完成率</p>
      <span id="task-rate" class="text-xs font-bold text-blue-500"></span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2">
      <div id="rate-bar" class="bg-blue-500 h-2 rounded-full"></div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="text-sm font-semibold dark:text-white mb-2">每日任务（需上传凭证）</div>
    <div id="task-list" class="space-y-3"></div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
    <div class="text-sm font-semibold dark:text-white mb-2">平台说明</div>
    <button onclick="location.href='about.html'" 
      class="w-full bg-blue-500 text-white py-2 rounded-lg text-xs">
      点击查看平台说明
    </button>
  </div>

  <button onclick="logout()" class="w-full bg-red-500 text-white py-3 rounded-xl text-sm">退出登录</button>
</div>

<script src="common.js"></script>
<script>
let user;
function loadUser() {
  user = getUser();
  document.getElementById('avatar').src = user.avatar || 'https://picsum.photos/200';
  document.getElementById('name').innerText = user.name || '未设置';
  document.getElementById('account').innerText = '账号：' + user.account;
}
function editNickname() {
  let newName = prompt('修改昵称', user.name);
  if(newName && newName.trim()) { user.name = newName.trim(); saveUser(user); loadUser(); }
}
function renderRealNameSimple() {
  let cert = getRealNameInfo(), s=document.getElementById('real-status'), b=document.getElementById('real-btn');
  cert.certified ? (s.innerText='已实名',s.className='text-xs text-green-500',b.innerText='已完成',b.className='text-xs px-2 py-1 bg-gray-400 text-white rounded')
  : (s.innerText='未实名',s.className='text-xs text-orange-500',b.innerText='去实名',b.className='text-xs px-2 py-1 bg-blue-500 text-white rounded');
}
function renderAIMemorySimple() {
  let m=getAIMemorySimple();
  document.getElementById('show-habit').innerText=m.habit;
  document.getElementById('show-favor').innerText=m.favor;
}
function setHabitPrompt(){let t=prompt('设置习惯',getAIMemorySimple().habit);if(t)setHabitSimple(t);}
function setFavorPrompt(){let t=prompt('设置喜好',getAIMemorySimple().habit);if(t)setFavorSimple(t);}
function renderTasks() {
  let tasks=getTasks(), html='', rate=getTaskRate();
  document.getElementById('task-rate').innerText=rate+'%';
  document.getElementById('rate-bar').style.width=rate+'%';
  tasks.forEach((t,i)=>{
    html+=`
    <div class="p-2 border rounded-lg dark:border-gray-700">
      <div class="flex justify-between items-center">
        <span class="text-xs ${t.done?'line-through text-gray-400':''} dark:text-white">${t.name}</span>
        <span class="text-xs ${t.done?'text-green-500':'text-orange-500'}">${t.done?'已完成':'未完成'}</span>
      </div>
      <div class="mt-2">
        <label class="text-[10px] text-gray-500 block mb-1">上传凭证图片（自动验真）</label>
        <input type="file" accept="image/*" onchange="uploadTaskImg(${i},event)" class="text-xs w-full dark:bg-gray-800 dark:text-white">
        ${t.img?`<img src="${t.img}" class="mt-2 w-full h-20 object-cover rounded">`:''}
      </div>
    </div>`;
  });
  document.getElementById('task-list').innerHTML=html;
}
</script>
</body>
</html>

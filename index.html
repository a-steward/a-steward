<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="keywords" content="Yara,AI派单,智能管家,AI咨询,生活服务">
<meta name="description" content="Yara AI智能生活管家，一站式全场景智能派单服务平台">
<!-- 【关键1：先加载配置文件，确保变量在Vue渲染前就存在】 -->
<script src="./env-config.js"></script>
<script src="./config.js"></script>
<!-- 【关键2：提前加载Vue等核心CDN，必须在页面模板之前加载】 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@element-plus/icons-vue/dist/index.css">
<!-- 加载公共资源 -->
<link rel="stylesheet" href="./yara-common.css">
<script src="./yara-common.js"></script>
<script src="./yara-stat.js"></script>
<!-- 页面专属样式 -->
<style>
/* 你原有的页面样式，原样粘贴在这里即可 */
#yara-home-app {
  min-height: 100vh;
  background-color: #f8fafc;
}
</style>
<!-- 【关键3：提前定义CONFIG全局变量，确保模板能读取到】 -->
<script>
  // 提前定义模板需要的CONFIG变量，兜底避免变量不存在导致白屏
  window.CONFIG = window.YARA_CONFIG || {
    brand: {
      fullName: 'Yara AI智能派单平台',
      name: 'Yara',
      slogan: '一站式全场景智能派单服务',
      icp: '鲁ICP备12345678号-1',
      customerService: { phone: '400-123-4567', workTime: '周一至周日 9:00-22:00' }
    },
    service: { types: [], vip: [] },
    operation: { banners: [], notice: '' }
  }
</script>
<title>{{ CONFIG.brand.fullName }} - AI智能生活管家</title>
</head>
<body>
<div id="yara-home-app">
  <!-- 你原有的页面HTML结构，原样保留在这里即可 -->
  <nav class="yara-home-nav">
    <div class="yara-home-logo" @click="window.location.href = './index.html'">
      {{ CONFIG.brand.name }}
    </div>
  </nav>
  <!-- 剩余页面内容 -->
</div>

<!-- 【关键4：Vue实例必须在页面DOM结构之后加载，确保能正常挂载】 -->
<script>
const { createApp } = Vue
const { ElMessage, ElMessageBox } = ElementPlus
createApp({
  setup() {
    // 【关键5：确保CONFIG变量在setup里能正常读取】
    const CONFIG = Vue.ref(window.CONFIG)
    
    // 你原有的页面逻辑，原样粘贴在这里即可

    return {
      CONFIG
      // 你原有的其他return变量和方法
    }
  }
}).use(ElementPlus).mount('#yara-home-app')
</script>
</body>
</html>

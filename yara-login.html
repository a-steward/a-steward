<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="Yara,AI派单,账号登录">
  <meta name="description" content="Yara 账号登录，一站式全场景智能派单服务">
  <!-- 严格加载顺序，杜绝白屏 -->
  <script src="./env-config.js"></script>
  <script src="./yara-config.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@element-plus/icons-vue/dist/index.css">
  <link rel="stylesheet" href="./yara-common.css">
  <script src="./yara-common.js"></script>
  <script src="./yara-stat.js"></script>
  <!-- 页面专属焕新样式 -->
  <style>
    .yara-login-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .yara-login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://picsum.photos/1920/1080?random=login') center/cover no-repeat;
      opacity: 0.1;
      filter: blur(10px);
    }
    .yara-login-box {
      width: 440px;
      padding: 45px 40px;
      background: var(--yara-bg-glass);
      backdrop-filter: blur(25px);
      border-radius: var(--yara-radius-xl);
      box-shadow: var(--yara-shadow-hover);
      border: 1px solid var(--yara-border-glass);
      position: relative;
      z-index: 2;
      animation: loginBoxSlide 0.6s ease forwards;
    }
    @keyframes loginBoxSlide {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .yara-login-logo {
      text-align: center;
      margin-bottom: 35px;
    }
    .yara-login-logo h1 {
      font-size: 32px;
      font-weight: 900;
      background: var(--yara-brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
    }
    .yara-login-logo p {
      font-size: 14px;
      color: var(--yara-text-secondary);
      margin: 0;
    }
    .yara-login-btn {
      width: 100%;
      height: 50px;
      font-size: 16px;
      font-weight: 700;
      border-radius: var(--yara-radius-full);
      margin-top: 10px;
      font-size: 16px;
    }
    .yara-back-home {
      position: absolute;
      top: 24px;
      left: 24px;
      color: var(--yara-text-white);
      font-size: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      transition: all var(--yara-transition-fast);
      z-index: 3;
    }
    .yara-back-home:hover {
      transform: translateX(-4px);
      color: var(--yara-brand-green);
    }
    .yara-login-tab .el-tabs__header {
      margin-bottom: 24px;
    }
    .yara-login-tab .el-tabs__nav-wrap::after {
      display: none;
    }
    .yara-login-tab .el-tabs__item {
      font-weight: 600;
      font-size: 16px;
      color: var(--yara-text-secondary);
    }
    .yara-login-tab .el-tabs__item.is-active {
      color: var(--yara-brand-green);
    }
    .yara-login-tab .el-tabs__active-bar {
      background: var(--yara-brand-gradient);
      height: 3px;
      border-radius: 3px;
    }
    @media (max-width: 768px) {
      .yara-login-box {
        width: 90%;
        padding: 35px 25px;
      }
      .yara-back-home {
        top: 16px;
        left: 16px;
      }
    }
  </style>
  <title>账号登录 - Yara</title>
</head>
<body>
  <div id="yara-login-app">
    <div class="yara-login-container">
      <a href="index.html" class="yara-back-home">
        <el-icon><ArrowLeft /></el-icon>
        返回首页
      </a>
      <div class="yara-login-box yara-slide-up-delay-1">
        <div class="yara-login-logo">
          <h1>{{ CONFIG?.brand?.name || 'Yara' }}</h1>
          <p>{{ loginType === 'login' ? '欢迎回来，请登录您的账号' : '忘记密码，重置您的登录密码' }}</p>
        </div>
        <el-tabs v-model="loginType" class="yara-login-tab" type="card" v-if="loginType === 'login'">
          <el-tab-pane label="账号密码登录" name="login">
            <el-form ref="loginFormRef" :model="loginForm" :rules="loginRules" size="large">
              <el-form-item prop="phone" class="yara-slide-up-delay-2">
                <el-input v-model="loginForm.phone" placeholder="请输入手机号" prefix-icon="Phone" clearable></el-input>
              </el-form-item>
              <el-form-item prop="password" class="yara-slide-up-delay-2">
                <el-input v-model="loginForm.password" type="password" placeholder="请输入登录密码" prefix-icon="Lock" show-password clearable></el-input>
              </el-form-item>
              <div class="yara-flex-between yara-mb-10 yara-slide-up-delay-2">
                <el-checkbox v-model="loginForm.remember" style="--el-checkbox-font-weight: 500;">记住密码</el-checkbox>
                <a @click="loginType = 'forget'" style="color: var(--yara-brand-green); font-size: 14px; cursor: pointer;">忘记密码？</a>
              </div>
            </el-form>
            <el-button type="primary" class="yara-login-btn yara-slide-up-delay-3" :loading="loading" @click="handleLogin">
              立即登录
            </el-button>
            <div class="yara-text-center yara-mt-20 yara-slide-up-delay-3">
              <span style="font-size: 14px; color: var(--yara-text-secondary);">还没有账号？</span>
              <a href="yara-register.html" style="color: var(--yara-brand-green); text-decoration: none; font-weight: 600;">立即注册</a>
            </div>
          </el-tab-pane>
        </el-tabs>
        <!-- 忘记密码面板 -->
        <template v-if="loginType === 'forget'">
          <el-form ref="forgetFormRef" :model="forgetForm" :rules="forgetRules" size="large">
            <el-form-item prop="phone" class="yara-slide-up-delay-2">
              <el-input v-model="forgetForm.phone" placeholder="请输入注册手机号" prefix-icon="Phone" clearable></el-input>
            </el-form-item>
            <el-form-item prop="code" class="yara-slide-up-delay-2">
              <div class="yara-flex" style="gap: 10px;">
                <el-input v-model="forgetForm.code" placeholder="请输入验证码" prefix-icon="Key" style="flex: 1;" clearable></el-input>
                <el-button :disabled="countDown > 0" @click="sendSmsCode" style="width: 120px; height: 40px; border-radius: var(--yara-radius-full);">
                  {{ countDown > 0 ? `${countDown}s后重发` : '获取验证码' }}
                </el-button>
              </div>
            </el-form-item>
            <el-form-item prop="newPassword" class="yara-slide-up-delay-2">
              <el-input v-model="forgetForm.newPassword" type="password" placeholder="请设置6-16位新密码" prefix-icon="Lock" show-password clearable></el-input>
            </el-form-item>
            <el-form-item prop="confirmPassword" class="yara-slide-up-delay-2">
              <el-input v-model="forgetForm.confirmPassword" type="password" placeholder="请再次确认新密码" prefix-icon="Lock" show-password clearable></el-input>
            </el-form-item>
          </el-form>
          <el-button type="primary" class="yara-login-btn yara-slide-up-delay-3" :loading="forgetLoading" @click="handleForgetPassword">
            重置密码
          </el-button>
          <div class="yara-text-center yara-mt-20 yara-slide-up-delay-3">
            <span style="font-size: 14px; color: var(--yara-text-secondary);">想起来了？</span>
            <a @click="loginType = 'login'" style="color: var(--yara-brand-green); cursor: pointer; font-weight: 600;">返回登录</a>
          </div>
        </template>
      </div>
    </div>
  </div>
  <script>
    const { createApp, onMounted } = Vue
    const { ElMessage } = ElementPlus
    createApp({
      setup() {
        const CONFIG = window.CONFIG
        const loginFormRef = Vue.ref()
        const forgetFormRef = Vue.ref()
        const loading = Vue.ref(false)
        const forgetLoading = Vue.ref(false)
        const countDown = Vue.ref(0)
        const loginType = Vue.ref(YARA_UTILS.getUrlParam('type') === 'forget' ? 'forget' : 'login')
        const redirectUrl = Vue.ref(YARA_UTILS.getUrlParam('redirect') || 'yara-index.html')

        const loginForm = Vue.reactive({
          phone: '',
          password: '',
          remember: false
        })
        const forgetForm = Vue.reactive({
          phone: '',
          code: '',
          newPassword: '',
          confirmPassword: ''
        })

        const loginRules = {
          phone: [
            { required: true, message: '请输入手机号', trigger: 'blur' },
            { validator: (rule, value, callback) => YARA_UTILS.validPhone(value) ? callback() : callback(new Error('请输入正确的手机号')), trigger: 'blur' }
          ],
          password: [
            { required: true, message: '请输入登录密码', trigger: 'blur' },
            { min: 6, max: 16, message: '密码长度为6-16位', trigger: 'blur' }
          ]
        }
        const validateConfirmPwd = (rule, value, callback) => {
          if (value !== forgetForm.newPassword) callback(new Error('两次输入的密码不一致'))
          else callback()
        }
        const forgetRules = {
          phone: [
            { required: true, message: '请输入手机号', trigger: 'blur' },
            { validator: (rule, value, callback) => YARA_UTILS.validPhone(value) ? callback() : callback(new Error('请输入正确的手机号')), trigger: 'blur' }
          ],
          code: [
            { required: true, message: '请输入验证码', trigger: 'blur' },
            { len: 6, message: '验证码为6位数字', trigger: 'blur' }
          ],
          newPassword: [
            { required: true, message: '请设置新密码', trigger: 'blur' },
            { min: 6, max: 16, message: '密码长度为6-16位', trigger: 'blur' }
          ],
          confirmPassword: [
            { required: true, message: '请再次确认新密码', trigger: 'blur' },
            { validator: validateConfirmPwd, trigger: 'blur' }
          ]
        }

        const handleLogin = async () => {
          if (!loginFormRef.value) return
          await loginFormRef.value.validate(async (valid) => {
            if (valid) {
              loading.value = true
              try {
                const res = await YARA_API_LIST.login(loginForm)
                YARA_STORAGE.setToken(res.data.token)
                YARA_STORAGE.setUserInfo(res.data.userInfo)
                const vipRes = await YARA_API_LIST.getMyVipInfo()
                YARA_STORAGE.setVipInfo(vipRes.data)
                ElMessage.success('登录成功，即将跳转')
                setTimeout(() => window.location.href = redirectUrl.value, 1500)
              } catch (error) {
                console.error('登录失败', error)
              } finally {
                loading.value = false
              }
            }
          })
        }
        const sendSmsCode = async () => {
          if (!YARA_UTILS.validPhone(forgetForm.phone)) {
            ElMessage.error('请输入正确的手机号')
            return
          }
          try {
            await YARA_API_LIST.sendSmsCode({ phone: forgetForm.phone, type: 'forget' })
            ElMessage.success('验证码发送成功')
            countDown.value = 60
            const timer = setInterval(() => {
              countDown.value--
              if (countDown.value <= 0) clearInterval(timer)
            }, 1000)
          } catch (error) {
            console.error('验证码发送失败', error)
          }
        }
        const handleForgetPassword = async () => {
          if (!forgetFormRef.value) return
          await forgetFormRef.value.validate(async (valid) => {
            if (valid) {
              forgetLoading.value = true
              try {
                await YARA_API_LIST.forgetPassword(forgetForm)
                ElMessage.success('密码重置成功，请使用新密码登录')
                loginType.value = 'login'
                loginForm.phone = forgetForm.phone
                loginForm.password = forgetForm.newPassword
              } catch (error) {
                console.error('密码重置失败', error)
              } finally {
                forgetLoading.value = false
              }
            }
          })
        }

        onMounted(() => {
          YARA_STAT.pageView('登录页')
        })

        return {
          CONFIG,
          loginType,
          loginFormRef,
          forgetFormRef,
          loading,
          forgetLoading,
          countDown,
          loginForm,
          forgetForm,
          loginRules,
          forgetRules,
          handleLogin,
          sendSmsCode,
          handleForgetPassword,
          YARA_UTILS
        }
      }
    }).use(ElementPlus).mount('#yara-login-app')
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="Yara,AI派单,个人中心">
  <meta name="description" content="Yara 个人中心，管理你的账号信息">
  <!-- 严格加载顺序 -->
  <script src="./env-config.js"></script>
  <script src="./yara-config.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@element-plus/icons-vue/dist/index.css">
  <link rel="stylesheet" href="./yara-common.css">
  <script src="./yara-common.js"></script>
  <script src="./yara-stat.js"></script>
  <!-- 页面专属样式 -->
  <style>
    .user-info-card {
      background: var(--yara-brand-gradient);
      border-radius: var(--yara-radius-xl);
      padding: 40px;
      color: var(--yara-bg-main);
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }
    .user-info-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }
    .user-info-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .user-name {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .user-desc {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 12px;
    }
    .user-tag-group {
      display: flex;
      gap: 10px;
    }
    .user-tag {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
  <title>个人中心 - Yara</title>
</head>
<body>
  <div id="yara-user-center-app">
    <div class="yara-layout-container">
      <!-- 侧边栏导航 -->
      <div class="yara-sidebar-container">
        <div class="yara-logo">
          <h2>{{ CONFIG?.brand?.name || 'Yara' }}</h2>
          <p>AI智能派单平台</p>
        </div>
        <el-menu
          :default-active="activeMenu"
          router
          background-color="transparent"
          text-color="#bfcbd9"
          active-text-color="var(--yara-brand-green)"
        >
          <el-menu-item index="yara-index.html">
            <el-icon><House /></el-icon>
            <span>控制台</span>
          </el-menu-item>
          <el-menu-item index="yara-create-order.html">
            <el-icon><Edit /></el-icon>
            <span>我要派单</span>
          </el-menu-item>
          <el-menu-item index="yara-order-list.html">
            <el-icon><Document /></el-icon>
            <span>订单管理</span>
          </el-menu-item>
          <el-menu-item index="yara-price.html">
            <el-icon><Medal /></el-icon>
            <span>会员中心</span>
          </el-menu-item>
          <el-menu-item index="yara-user-center.html">
            <el-icon><User /></el-icon>
            <span>个人中心</span>
          </el-menu-item>
          <el-menu-item index="index.html" class="yara-back-home">
            <el-icon><ArrowLeft /></el-icon>
            <span>返回首页</span>
          </el-menu-item>
        </el-menu>
      </div>
      <!-- 主内容区 -->
      <div class="yara-main-content">
        <!-- 顶部导航栏 -->
        <div class="yara-header-container">
          <div class="yara-header-left">
            <el-breadcrumb separator="/">
              <el-breadcrumb-item :to="{ path: 'yara-index.html' }">控制台</el-breadcrumb-item>
              <el-breadcrumb-item>个人中心</el-breadcrumb-item>
            </el-breadcrumb>
          </div>
          <div class="yara-header-right yara-flex" style="gap: 20px;">
            <el-button type="danger" @click="YARA_AUTH.logout()">退出登录</el-button>
          </div>
        </div>
        <!-- 页面内容 -->
        <div class="yara-page-wrapper">
          <div class="yara-page-container">
            <!-- 用户信息卡片 -->
            <div class="user-info-card yara-slide-up-delay-1">
              <div class="user-info-content">
                <el-avatar :size="100" :src="userInfo.avatar" class="user-avatar"></el-avatar>
                <div>
                  <h1 class="user-name">{{ userInfo.nickname || userInfo.phone }}</h1>
                  <p class="user-desc">账号：{{ userInfo.phone }}</p>
                  <div class="user-tag-group">
                    <div class="user-tag" v-if="vipInfo.isVip">VIP会员</div>
                    <div class="user-tag">注册时间：{{ YARA_UTILS.formatTime(userInfo.createTime, 'YYYY-MM-DD') }}</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 账号信息编辑 -->
            <el-card shadow="never" class="yara-card yara-mb-20 yara-slide-up-delay-2">
              <template #header>
                <span class="yara-card-title">账号信息</span>
              </template>
              <el-form
                ref="userFormRef"
                :model="userForm"
                :rules="userRules"
                label-width="120px"
                size="large"
                style="max-width: 600px;"
              >
                <el-form-item label="头像">
                  <el-upload
                    class="avatar-uploader"
                    action="#"
                    :show-file-list="false"
                    :before-upload="beforeAvatarUpload"
                    :http-request="handleAvatarUpload"
                  >
                    <img v-if="userForm.avatar" :src="userForm.avatar" class="avatar" style="width: 80px; height: 80px; border-radius: 50%;" />
                    <el-icon v-else class="avatar-uploader-icon" style="font-size: 28px; color: #8c939d; width: 80px; height: 80px; line-height: 80px; text-align: center; border: 1px dashed #d9d9d9; border-radius: 6px;"><Plus /></el-icon>
                  </el-upload>
                </el-form-item>
                <el-form-item label="昵称" prop="nickname">
                  <el-input v-model="userForm.nickname" placeholder="请输入昵称" clearable></el-input>
                </el-form-item>
                <el-form-item label="手机号">
                  <el-input v-model="userInfo.phone" disabled></el-input>
                </el-form-item>
                <el-form-item label="个性签名" prop="sign">
                  <el-input v-model="userForm.sign" type="textarea" :rows="3" placeholder="请输入个性签名" maxlength="100" show-word-limit></el-input>
                </el-form-item>
                <el-form-item>
                  <el-button type="primary" :loading="updateLoading" @click="handleUpdateUserInfo">保存修改</el-button>
                  <el-button @click="handleReset">重置</el-button>
                </el-form-item>
              </el-form>
            </el-card>

            <!-- 修改密码 -->
            <el-card shadow="never" class="yara-card yara-slide-up-delay-3">
              <template #header>
                <span class="yara-card-title">修改密码</span>
              </template>
              <el-form
                ref="passwordFormRef"
                :model="passwordForm"
                :rules="passwordRules"
                label-width="120px"
                size="large"
                style="max-width: 600px;"
              >
                <el-form-item label="原密码" prop="oldPassword">
                  <el-input v-model="passwordForm.oldPassword" type="password" placeholder="请输入原密码" show-password clearable></el-input>
                </el-form-item>
                <el-form-item label="新密码" prop="newPassword">
                  <el-input v-model="passwordForm.newPassword" type="password" placeholder="请设置6-16位新密码" show-password clearable></el-input>
                </el-form-item>
                <el-form-item label="确认新密码" prop="confirmPassword">
                  <el-input v-model="passwordForm.confirmPassword" type="password" placeholder="请再次确认新密码" show-password clearable></el-input>
                </el-form-item>
                <el-form-item>
                  <el-button type="primary" :loading="passwordLoading" @click="handleUpdatePassword">修改密码</el-button>
                  <el-button @click="handleResetPassword">重置</el-button>
                </el-form-item>
              </el-form>
            </el-card>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const { createApp, onMounted } = Vue
    const { ElMessage } = ElementPlus
    createApp({
      setup() {
        const CONFIG = window.CONFIG
        const activeMenu = Vue.ref('yara-user-center.html')
        const userFormRef = Vue.ref()
        const passwordFormRef = Vue.ref()
        const updateLoading = Vue.ref(false)
        const passwordLoading = Vue.ref(false)
        const userInfo = Vue.ref(YARA_STORAGE.getUserInfo())
        const vipInfo = Vue.ref(YARA_STORAGE.getVipInfo())

        const userForm = Vue.reactive({
          avatar: '',
          nickname: '',
          sign: ''
        })
        const passwordForm = Vue.reactive({
          oldPassword: '',
          newPassword: '',
          confirmPassword: ''
        })

        const userRules = {
          nickname: [{ required: true, message: '请输入昵称', trigger: 'blur' }]
        }
        const validateConfirmPassword = (rule, value, callback) => {
          if (value !== passwordForm.newPassword) callback(new Error('两次输入的密码不一致'))
          else callback()
        }
        const passwordRules = {
          oldPassword: [{ required: true, message: '请输入原密码', trigger: 'blur' }],
          newPassword: [
            { required: true, message: '请输入新密码', trigger: 'blur' },
            { min: 6, max: 16, message: '密码长度为6-16位', trigger: 'blur' }
          ],
          confirmPassword: [
            { required: true, message: '请再次确认新密码', trigger: 'blur' },
            { validator: validateConfirmPassword, trigger: 'blur' }
          ]
        }

        const handleCommand = (command) => {
          if (command === 'logout') YARA_AUTH.logout()
        }
        const getUserInfo = async () => {
          try {
            const res = await YARA_API_LIST.getUserInfo()
            userInfo.value = res.data
            YARA_STORAGE.setUserInfo(res.data)
            userForm.avatar = res.data.avatar || ''
            userForm.nickname = res.data.nickname || ''
            userForm.sign = res.data.sign || ''
            const vipRes = await YARA_API_LIST.getMyVipInfo()
            vipInfo.value = vipRes.data
            YARA_STORAGE.setVipInfo(vipRes.data)
          } catch (error) {
            console.error('获取用户信息失败', error)
          }
        }
        const beforeAvatarUpload = (file) => {
          const isJPGOrPNG = file.type === 'image/jpeg' || file.type === 'image/jpg' || file.type === 'image/png'
          const isLt2M = file.size / 1024 / 1024 < 2
          if (!isJPGOrPNG) {
            ElMessage.error('头像只能是 JPG/PNG 格式!')
            return false
          }
          if (!isLt2M) {
            ElMessage.error('头像大小不能超过 2MB!')
            return false
          }
          return true
        }
        const handleAvatarUpload = async (options) => {
          const formData = new FormData()
          formData.append('file', options.file)
          try {
            const res = await YARA_API_LIST.uploadFile(formData)
            userForm.avatar = res.data.url
            ElMessage.success('头像上传成功')
          } catch (error) {
            console.error('头像上传失败', error)
            ElMessage.error('头像上传失败')
          }
        }
        const handleUpdateUserInfo = async () => {
          if (!userFormRef.value) return
          await userFormRef.value.validate(async (valid) => {
            if (valid) {
              updateLoading.value = true
              try {
                await YARA_API_LIST.updateUserInfo(userForm)
                ElMessage.success('用户信息修改成功')
                getUserInfo()
              } catch (error) {
                console.error('用户信息修改失败', error)
              } finally {
                updateLoading.value = false
              }
            }
          })
        }
        const handleReset = () => {
          userForm.avatar = userInfo.value.avatar || ''
          userForm.nickname = userInfo.value.nickname || ''
          userForm.sign = userInfo.value.sign || ''
        }
        const handleUpdatePassword = async () => {
          if (!passwordFormRef.value) return
          await passwordFormRef.value.validate(async (valid) => {
            if (valid) {
              passwordLoading.value = true
              try {
                await YARA_API_LIST.updateUserInfo({
                  oldPassword: passwordForm.oldPassword,
                  newPassword: passwordForm.newPassword
                })
                ElMessage.success('密码修改成功，请重新登录')
                YARA_AUTH.logout(false)
              } catch (error) {
                console.error('密码修改失败', error)
              } finally {
                passwordLoading.value = false
              }
            }
          })
        }
        const handleResetPassword = () => {
          passwordFormRef.value.resetFields()
        }

        onMounted(() => {
          getUserInfo()
          YARA_STAT.pageView('个人中心页')
        })

        return {
          CONFIG,
          activeMenu,
          userFormRef,
          passwordFormRef,
          updateLoading,
          passwordLoading,
          userInfo,
          vipInfo,
          userForm,
          passwordForm,
          userRules,
          passwordRules,
          YARA_UTILS,
          handleCommand,
          getUserInfo,
          beforeAvatarUpload,
          handleAvatarUpload,
          handleUpdateUserInfo,
          handleReset,
          handleUpdatePassword,
          handleResetPassword
        }
      }
    }).use(ElementPlus).mount('#yara-user-center-app')
  </script>
</body>
</html>

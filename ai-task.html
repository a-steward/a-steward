<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task - A Steward</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .task-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .task-card h3 {
            margin-bottom: 0.5rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #fff;
            color: #667eea;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin-top: 1.5rem;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 1rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
        }
        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>🎯 生成你的专属任务</h1>
        <div id="task-container">
            <div class="task-card">
                <h3>事业任务</h3>
                <p>今天专注完成一个重要项目里程碑，提升专业能力。</p>
            </div>
            <div class="task-card">
                <h3>情感任务</h3>
                <p>花 15 分钟和重要的人深度交流，表达你的关心。</p>
            </div>
            <div class="task-card">
                <h3>生活任务</h3>
                <p>整理一下生活空间，让环境更清爽，提升生活质量。</p>
            </div>
        </div>
        <button class="btn" onclick="generateTasks()">Generate with A Steward</button>
    </div>

    <script>
        function generateTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = `
                <div class="task-card">
                    <h3>事业任务 ✅</h3>
                    <p>今天专注完成一个重要项目里程碑，提升专业能力。</p>
                </div>
                <div class="task-card">
                    <h3>情感任务 ✅</h3>
                    <p>花 15 分钟和重要的人深度交流，表达你的关心。</p>
                </div>
                <div class="task-card">
                    <h3>生活任务 ✅</h3>
                    <p>整理一下生活空间，让环境更清爽，提升生活质量。</p>
                </div>
            `;
        }
    </script>
</body>
</html>

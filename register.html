<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen" onload="initDarkMode()">
<div class="max-w-md mx-auto px-4 py-3">
  <a href="index.html" class="inline-block px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded-lg text-xs dark:text-white">← 返回主页</a>
</div>
<div class="max-w-md mx-auto p-6 pt-2">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6">
    <h2 class="text-xl font-bold text-center dark:text-white mb-6">注册</h2>
    <div class="space-y-4">
      <div><label class="block text-sm dark:text-white mb-1">账号</label><input id="account" class="w-full border rounded-lg p-2.5 dark:bg-gray-700 dark:text-white"></div>
      <div><label class="block text-sm dark:text-white mb-1">密码</label><input id="pwd" type="password" class="w-full border rounded-lg p-2.5 dark:bg-gray-700 dark:text-white"></div>
      <div><label class="block text-sm dark:text-white mb-1">昵称</label><input id="name" class="w-full border rounded-lg p-2.5 dark:bg-gray-700 dark:text-white"></div>
      <div class="flex items-center text-sm text-gray-600 dark:text-gray-300">
        <input type="checkbox" id="agree" class="mr-2">
        <span>我已阅读并同意</span><a href="agreement.html" target="_blank" class="text-blue-500 mx-1">《用户协议》</a><span>和</span><a href="privacy.html" target="_blank" class="text-blue-500 mx-1">《隐私政策》</a>
      </div>
      <button onclick="register()" class="w-full bg-green-500 text-white p-2.5 rounded-lg">注册</button>
      <p class="text-center text-sm dark:text-gray-300">已有账号？<a href="login.html" class="text-blue-500">登录</a></p>
    </div>
  </div>
</div>
<script src="common.js"></script>
<script>
function register() {
  let account = document.getElementById('account').value.trim();
  let pwd = document.getElementById('pwd').value.trim();
  let name = document.getElementById('name').value.trim();
  let agreed = document.getElementById('agree').checked;
  if (!account || !pwd || !name) return alert('请填写完整');
  if (!agreed) return alert('请勾选协议');
  localStorage.setItem('user', JSON.stringify({ avatar:'', account,pwd,name, agreed:true }));
  alert('注册成功！去登录');
  location.href = 'login.html';
}
</script>
</body>
</html>
